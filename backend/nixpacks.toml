# Nixpacks — configuración de build para Railway
# Fija Python 3.11 y asegura que psycopg2 encuentre las libs del sistema.

[phases.setup]
nixPkgs = ["python311", "postgresql_15"]

[phases.install]
cmds = ["pip install --upgrade pip", "pip install -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
